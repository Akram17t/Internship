chat_answer_task:
  description: >
    Answer the user's latest question in Indonesian using only the retrieved evidence.

    Latest question:
    {question}

    Retrieved evidence:
    {evidence}

    Available downloadable forms:
    {available_forms}

    Be natural and helpful. Choose the format that best
    fits the question: paragraphs, bullets, numbered steps, a small table, or a
    mix. Do not force a fixed template. If the user asks about a process or SOP,
    make the flow clear and include relevant actors, forms, approvals, outputs,
    deadlines, conditions, and exceptions when they are supported by the evidence.

    Citation rules:
    - Keep citation markers like [1] and [2] in the answer.
    - Put citations at the end of important paragraphs, bullets, or table rows.
    - Do not cite every small phrase if one citation can support the whole sentence.
    - Never output a generic marker like [n].
    - Do not write a separate sources/references section because the app renders
      source details from the markers.

    Form selection rules:
    - If the answer requires one or more downloadable forms, choose them ONLY from
      the available downloadable forms list.
    - If no available form is needed, choose an empty list.
    - Do not invent form names.
    - Do not write downloadable form filenames, .xlsx names, or a separate
      "formulir terkait/tersedia", "form yang bisa diunduh", or similar form
      download section inside the visible answer. The app will render selected
      forms separately.
    - If a form is relevant to the policy, mention its human-readable form name
      only where it naturally belongs in the explanation, then select the matching
      filename in FORM_SELECTION.
    - If the answer explicitly says no additional form is required, FORM_SELECTION
      must be [].
    - If the evidence directly answers the question, at the very end add exactly
      one machine-readable line:
      FORM_SELECTION: ["exact form filename.xlsx"]
    - If no form is needed, write exactly:
      FORM_SELECTION: []

    Reliability rules:
    - Do not invent policy details, files, page numbers, form numbers, approvals,
      actors, calculations, requirements, exceptions, or recommendations.
    - If the evidence does not directly answer the question, answer briefly in
      this exact sentence only: "Sistem tidak dapat menemukan informasi terkait
      hal tersebut di dalam dokumen SOP. Silakan lakukan eskalasi ke HR atau
      manajer terkait untuk instruksi manual."
      Do not add FORM_SELECTION in this unsupported case.
  expected_output: >
    A clear grounded Indonesian answer with tidy numeric citation markers, no
    separate sources section, and one final FORM_SELECTION line.
  agent: answer_writer

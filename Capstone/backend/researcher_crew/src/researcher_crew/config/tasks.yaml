chat_answer_task:
  description: >
    Answer the user's latest question in Indonesian using only the retrieved evidence.

    Latest question:
    {question}

    Retrieved evidence:
    {evidence}

    Be natural and helpful. Choose the format that best fits the question:
    short paragraphs, bullets, numbered steps, a small table, or a mix. Do not force
    a fixed template. If the user asks about a process or SOP, make the flow clear,
    but only include actors, forms, approvals, outputs, or deadlines that are supported
    by the evidence.

    Citation rules:
    - Keep citation markers like [1] and [2] in the answer.
    - Put citations at the end of important paragraphs, bullets, or table rows.
    - Do not cite every small phrase if one citation can support the whole sentence.
    - Never output a generic marker like [n].
    - Do not write a separate sources/references section because the app renders
      source details from the markers.

    Reliability rules:
    - Do not invent policy details, files, page numbers, form numbers, approvals,
      actors, calculations, requirements, exceptions, or recommendations.
    - If something is not confirmed by the evidence, say that briefly.
    - Avoid long narrative filler.
  expected_output: >
    A clear grounded Indonesian answer with tidy numeric citation markers and no
    separate sources section.
  agent: answer_writer
